<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Evolution PO · 30-дневный курс</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="cloud-sync.js"></script>
<script src="course-lessons.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f14">
<link rel="stylesheet" href="mobile.css">

<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    margin: 0; background: #fafaf7; color: #1a1a1a; line-height: 1.55;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-size: 26px; margin: 0 0 4px; }
  h2 { font-size: 19px; margin: 16px 0 12px; }
  h3 { font-size: 16px; margin: 14px 0 8px; }
  a { color: #3b82f6; }
  .nav-bar { display: flex; justify-content: space-between; align-items: center;
             margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .nav-bar a { background: rgba(0,0,0,0.05); color: #555;
               padding: 6px 12px; border-radius: 8px; font-size: 13px;
               text-decoration: none; }
  .nav-bar a:hover { background: rgba(0,0,0,0.1); }
  .day-chip { background: #1a1a1a; color: white; padding: 4px 12px;
              border-radius: 999px; font-size: 12px; font-weight: 600;
              letter-spacing: .04em; }
  .timer { background: #fff; border: 1px solid #e0e0e0; padding: 8px 16px;
           border-radius: 999px; font-variant-numeric: tabular-nums;
           font-weight: 600; font-size: 14px; }
  .timer.warning { background: #fef3c7; border-color: #fde68a; }
  .phase-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .phase-tab { flex: 1; padding: 10px; border: 1px solid #e0e0e0; border-radius: 10px;
               background: #fff; text-align: center; font-size: 12px; opacity: .5; }
  .phase-tab.active { background: #1a1a1a; color: white; opacity: 1; }
  .phase-tab.done { background: #ecfdf5; border-color: #a7f3d0; color: #047857; opacity: 1; }
  .phase-tab .num { font-size: 18px; font-weight: 700; display: block; }
  .phase { display: none; }
  .phase.active { display: block; animation: fade .3s; }
  @keyframes fade { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }
  .card { background: #fff; border: 1px solid #e9e9e2; border-radius: 14px;
          padding: 22px; margin-bottom: 14px; }
  .scenario { background: linear-gradient(135deg,#fef3c7,#fef0d6);
              border: 1px solid #fde68a; padding: 16px 18px; border-radius: 12px;
              font-size: 14px; margin-bottom: 14px; }
  .scenario b { color: #92400e; }
  .options label { display: block; padding: 12px 16px; margin-bottom: 8px;
                   border: 1px solid #e0e0e0; border-radius: 10px; cursor: pointer;
                   transition: all .15s; font-size: 14px; }
  .options label:hover { border-color: #3b82f6; background: #f5f8ff; }
  .options label:has(input:checked) { border-color: #3b82f6; background: #eef3ff; }
  .options input { margin-right: 10px; }
  .feedback { margin-top: 12px; padding: 14px 16px; border-radius: 10px;
              font-size: 13.5px; display: none; }
  .feedback.correct { background: #ecfdf5; border: 1px solid #a7f3d0; color: #047857; }
  .feedback.wrong { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
  .feedback.show { display: block; animation: fade .3s; }
  button, .btn { background: #1a1a1a; color: #fff; border: 0; padding: 13px 24px;
                 font-size: 15px; font-weight: 600; border-radius: 12px; cursor: pointer;
                 width: 100%; margin-top: 12px; text-decoration: none;
                 display: inline-block; text-align: center; }
  button:disabled { background: #c0c0c0; cursor: not-allowed; }
  button:hover:not(:disabled), .btn:hover { background: #000; }
  .btn-secondary { background: rgba(0,0,0,0.05); color: #1a1a1a; }
  .btn-secondary:hover { background: rgba(0,0,0,0.1); }
  .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
                 margin-top: 16px; }
  .nav-buttons .btn { width: 100%; }
  .lcards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 14px 0; }
  @media (max-width: 600px) { .lcards { grid-template-columns: 1fr; } }
  .lcard { background: white; border: 1px solid #e9e9e2; padding: 14px; border-radius: 12px; }
  .lcard .emoji { font-size: 22px; display: block; margin-bottom: 6px; }
  .lcard .nm { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .lcard .ds { font-size: 13px; color: #555; }
  .key-takeaway { background: linear-gradient(135deg,#dbeafe,#e9d5ff);
                  border: 1px solid #c7d2fe; padding: 16px 18px; border-radius: 12px;
                  font-size: 14px; margin: 14px 0; }
  .key-takeaway b { color: #4c1d95; }
  .formula-box { background: linear-gradient(135deg,#f5f3ff,#ede9fe);
                 border: 1px solid #c4b5fd; border-radius: 14px;
                 padding: 18px 20px; margin: 16px 0;
                 font-family: ui-monospace, 'SF Mono', Menlo, monospace;
                 font-size: 14px; line-height: 1.7; }
  .formula-box .lbl { font-size: 11px; color: #6d28d9; font-weight: 700;
                      letter-spacing: .06em; text-transform: uppercase;
                      margin-bottom: 8px; font-family: inherit; }
  textarea { width: 100%; min-height: 100px; padding: 12px; font-family: inherit;
             font-size: 14px; border: 1px solid #d0d0d0; border-radius: 10px;
             resize: vertical; }
  .micro-task { background: #1a1a1a; color: white; padding: 18px;
                border-radius: 12px; margin-top: 14px; }
  .micro-task .label { font-size: 11px; opacity: .7; letter-spacing: .08em;
                       text-transform: uppercase; margin-bottom: 6px; }
  .complete-banner { background: linear-gradient(135deg,#10b981,#059669); color: white;
                     padding: 24px; border-radius: 14px; text-align: center; margin-top: 20px; }
  .complete-banner h3 { margin: 0 0 6px; font-size: 22px; }
  .complete-banner p { margin: 0; opacity: .95; font-size: 14px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 16px 0; }
  .stat { background: #fff; border: 1px solid #e9e9e2; padding: 12px;
          border-radius: 10px; text-align: center; color: #1a1a1a; }
  .stat .v { font-size: 22px; font-weight: 700; color: #3b82f6; }
  .stat .l { font-size: 11px; color: #6b6b6b; text-transform: uppercase;
             letter-spacing: .05em; }
  /* MAP / HOME */
  .map-week { background: white; border: 1px solid #e9e9e2; border-radius: 14px;
              padding: 18px; margin-bottom: 14px; }
  .map-week-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .map-week-theme { color: #6b6b6b; font-size: 13px; margin-bottom: 12px; }
  .map-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  @media (max-width: 600px) { .map-days { grid-template-columns: repeat(4, 1fr); } }
  .map-day { aspect-ratio: 1; background: #f5f5f0; border: 1px solid #e0e0e0;
             border-radius: 10px; padding: 8px; display: flex; flex-direction: column;
             justify-content: space-between; text-decoration: none; color: inherit;
             transition: all .2s; position: relative; cursor: pointer; }
  .map-day:hover { background: white; transform: translateY(-2px); }
  .map-day.done { background: #ecfdf5; border-color: #a7f3d0; }
  .map-day.current { background: linear-gradient(135deg,#3b82f6,#8b5cf6); color: white; border-color: #a855f7; }
  .map-day.review { background: #fff7ed; border-color: #fed7aa; }
  .map-day .n { font-size: 16px; font-weight: 700; }
  .map-day .topic { font-size: 9.5px; line-height: 1.2; }
  .map-day .badge { position: absolute; top: 4px; right: 4px; font-size: 11px; font-weight: 700; }
  .map-day.done .badge { color: #10b981; }
  .map-day.done .badge::after { content: '✓'; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 14px 0;
                   background: white; border-radius: 10px; overflow: hidden; }
  .compare-table th, .compare-table td { padding: 10px; text-align: left;
                                         border-bottom: 1px solid #f0f0eb; vertical-align: top; }
  .compare-table th { background: #f5f5f0; font-weight: 700; }
  .compare-table td:first-child { font-weight: 600; width: 30%; }

  /* ===== Lesson player (углублённый разбор дня) ===== */
  .lsn-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px); display: flex; align-items: flex-end;
    justify-content: center; z-index: 200; }
  .lsn-modal.hidden { display: none; }
  .lsn-sheet { background: #15151b; color: #e8e8ea; width: 100%; max-width: 720px;
    border-radius: 22px 22px 0 0; padding: 22px 18px 28px; max-height: 92vh;
    overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.08); }
  .lsn-sheet .lsn-close { background: rgba(255,255,255,0.06); color: #fff; border: 0;
    border-radius: 8px; padding: 6px 10px; font-size: 12px; float: right; cursor: pointer; }
  .lsn-step { font-size: 12.5px; color: #6b7280; text-transform: uppercase;
    letter-spacing: .06em; font-weight: 700; }
  .lsn-title { font-size: 19px; font-weight: 800; margin: 6px 0 14px; line-height: 1.3; color: #f3f4f6; }
  .lsn-body { background: rgba(255,255,255,0.03); border-radius: 12px;
    padding: 14px 16px; font-size: 14px; line-height: 1.55; color: #e5e7eb; }
  .lsn-body.code { font-family: ui-monospace, monospace; color: #cbd5e1; font-size: 13px; }
  .lsn-row { margin-top: 14px; }
  .lsn-lbl { font-size: 11px; text-transform: uppercase; color: #6b7280;
    letter-spacing: .08em; font-weight: 700; margin-bottom: 6px; }
  .lsn-num, .lsn-text { background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 11px 14px;
    border-radius: 10px; font-size: 14px; width: 100%; outline: none;
    font-family: inherit; }
  .lsn-num { font-family: ui-monospace, monospace; font-size: 16px; }
  .lsn-num:focus, .lsn-text:focus { border-color: rgba(255,255,255,0.32); }
  .lsn-check { width: 100%; margin-top: 12px; padding: 12px; border: 0;
    border-radius: 12px; font-weight: 700; background: #fff; color: #0f0f14;
    cursor: pointer; font-size: 14.5px; }
  .lsn-fb { margin-top: 12px; padding: 12px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.04); font-size: 13.5px; line-height: 1.5;
    display: none; color: #cbd5e1; }
  .lsn-fb.on { display: block; }
  .lsn-fb.ok { background: rgba(16,185,129,0.10); color: #a7f3d0; }
  .lsn-fb.bad { background: rgba(244,63,94,0.10); color: #fda4af; }
  .lsn-fb.info { background: rgba(245,158,11,0.10); color: #fcd34d; }
  .lsn-next { width: 100%; margin-top: 12px; padding: 12px; border: 0;
    border-radius: 12px; font-weight: 700; background: #fff; color: #0f0f14;
    cursor: pointer; font-size: 14.5px; display: none; }
  .lsn-next.on { display: block; }
  .lsn-opt { display: block; background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.09); padding: 11px 14px;
    border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 13.5px;
    line-height: 1.45; color: #e5e7eb; }
  .lsn-opt.correct { background: rgba(16,185,129,0.13); border-color: rgba(16,185,129,0.55); }
  .lsn-opt.wrong { background: rgba(244,63,94,0.13); border-color: rgba(244,63,94,0.55); }
  .lsn-opt.right { background: rgba(110,231,183,0.13); border-color: rgba(110,231,183,0.6); }
  .lsn-bar { display: flex; gap: 4px; margin-bottom: 14px; }
  .lsn-bar .seg { flex: 1; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.08); }
  .lsn-bar .seg.done { background: #6ee7b7; } .lsn-bar .seg.cur { background: #fff; }
  .lsn-bar .seg.wrong { background: rgba(244,63,94,0.7); }
  .lsn-end { text-align: center; padding: 14px 0 6px; }
  .lsn-end .pct { font-size: 38px; font-weight: 800; margin: 8px 0 12px; }
  .pct.ok { color: #6ee7b7; } .pct.mid { color: #fcd34d; } .pct.bad { color: #fda4af; }
  .deep-btn { display: inline-block; background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; padding: 12px 20px; border-radius: 12px; text-decoration: none;
    font-weight: 700; font-size: 14px; border: 0; cursor: pointer; margin-right: 10px; }
  .map-day .deep-mark { position: absolute; bottom: 3px; right: 4px;
    font-size: 9px; color: #8b5cf6; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<div class="lsn-modal hidden" id="lsnModal"><div class="lsn-sheet" id="lsnSheet"></div></div>

<script>
// ===================================================================
// COURSE DATA — все 30 уроков как данные. Полная редактируемая модель.
// Структура: { d:day, w:week, t:title, e:emoji, a:area, s1/s2/s3:slots, L:learning, K:takeaway, T:task }
// slot: { sc:[scenarios], op:[[text, isCorrect, feedback], ...] }
// L entry: {type:'p'|'cards'|'card'|'compare'|'formula'|'list', ...}
// ===================================================================
const COURSE = [];

// =================== WEEK 1 — Foundations + Metrics ===================
COURSE.push({
  d:1, w:1, t:"Роль Product Owner", e:"🎭", a:"Роль PO",
  s1:{sc:[
    "Утро понедельника. CTO пишет: «Решил, что в следующем спринте делаем переход на новую БД — иначе через месяц упрёмся в производительность». Что делает PO?",
    "VP Engineering вернулся с конференции с горящими глазами: «Друг из Stripe сказал — у них всё на edge functions, нам тоже надо. Я уже сказал инвесторам». Что делает PO?",
    "Пятница, 23:47. Lead engineer в Slack: «Нашёл уязвимость уровня \"может уволить весь отдел\", надо срочно переписать auth». ТЗ на 12&nbsp;000 слов от ChatGPT. Что делает PO?"
  ], op:[
    ["Согласиться — техническая инфраструктура вне зоны решений PO и определяется лидом инженерии", false, "Слепое согласие выводит решение из зоны PO. Технический сигнал важен, но решение о приоритете — про ценность бизнеса."],
    ["Поставить в бэклог по обычной процедуре, технический долг конкурирует с фичами на равных", false, "Процессно нейтрально, но игнорирует уровень сигнала. Crisis-trigger требует другого инструмента, не обычной очереди."],
    ["Уточнить бизнес-влияние (затронутые клиенты, таймлайн риска, варианты) и решить на данных", true, "PO собирает данные перед решением. Это превращает эмоциональную срочность в продуктовое решение."],
    ["Провести командный ретро по запросу для выявления опасений участников до решения", false, "Ретро — инструмент рефлексии процесса, не приоритизации. Задерживает решение, не отвечает на бизнес-вопрос."]
  ]},
  s2:{sc:[
    "Команде нужно решить «делаем фичу A или фичу B». Голоса разделились 3 на 3. Кто принимает финальное решение?",
    "В Slack-треде участвуют 8 человек, 47 сообщений, 4 thumbs-up и одно 🍿. Вопрос «A или B» не решён за 2 дня. Кто разрулит?",
    "На груминге: бэкендер хочет рефакторинг, фронтендер — новый дизайн, QA — стабилизацию, дизайнер — design system. Все по 2. Кто решает?"
  ], op:[
    ["Scrum Master как фасилитатор разрешает тупик и помогает команде продолжить работу", false, "Scrum Master защищает фреймворк, но не упорядочивает бэклог. Это не его подотчётность."],
    ["Product Owner — упорядочивание Product Backlog является его подотчётностью по Scrum Guide", true, "По Scrum Guide PO accountable за упорядочивание. Делегация голосованием размывает подотчётность."],
    ["Tech Lead, поскольку технические последствия часто доминируют в выборе между опциями", false, "Tech Lead решает «как», не «что». Это разделение фундаментально для здоровой команды."],
    ["Старший стейкхолдер бизнеса — эскалация разорвёт тупик при отсутствии консенсуса", false, "Эскалация = отказ от зоны ответственности. PO имеет полномочия принять решение сам."]
  ]},
  s3:{sc:[
    "Энтерпрайз-клиент ($400k/год) грозит уйти, если не появится «экспорт дашбордов в PDF». CS требует включить в спринт. Тех-лид: 3 недели. Маркетинг просит фичу для SMB. Что делает PO?",
    "Топ-клиент: «Нам нужно как в Excel». Прошлая неделя — «как в SharePoint». Через месяц будет «как в Salesforce». CS пересылает всё с «срочно». Что делает PO?",
    "Клиент прислал Excel из 47 строк, скопированных из RFP, subject «срочно, иначе renewal сорвётся». Пятница 17:42. CS в панике. Тех-лид молча. Что делает PO?"
  ], op:[
    ["Подтвердить обязательство клиенту немедленно — выручка слишком существенна, чтобы рисковать", false, "Реактивное обязательство без discovery — антипаттерн. За буквальным запросом часто другая истинная задача."],
    ["Уточнить с клиентом, какую задачу он решает, и проверить альтернативы прежде чем брать в работу", true, "Discovery-first: понять задачу, не реализовывать буквальный запрос. Часто решение в разы дешевле."],
    ["Запустить параллельно оба направления, разделив команду пополам для сохранения отношений", false, "Разделение — антипаттерн context-switching. WIP нарушается, оба направления хуже."],
    ["Поставить обе фичи в бэклог и решить через RICE или WSJF — формальный фреймворк даст приоритет", false, "Без discovery входные данные ошибочны: оцениваешь RICE для буквального запроса, не для настоящей задачи."]
  ]},
  L:[
    {type:"p", html:"PO постоянно переключается между четырьмя ролями (шляпами). Понять их = понять профессию."},
    {type:"cards", items:[
      {e:"💎", nm:"1. Value Maximizer", ds:"Решает что делать, чтобы максимизировать ценность для бизнеса и пользователей. Главная ответственность по Scrum Guide."},
      {e:"📋", nm:"2. Backlog Steward", ds:"Бэклог — единственный источник истины о работе. PO его создаёт, упорядочивает, объясняет, прозрачен для всех."},
      {e:"🌉", nm:"3. Bridge", ds:"Между бизнесом, пользователями и командой. Переводит запросы стейкхолдеров в задачи, цели — в исходы."},
      {e:"🔬", nm:"4. Discovery Lead", ds:"Не диктует решения, а ведёт исследование: что за проблема, кому, зачем. В B2B SaaS — критично."}
    ]},
    {type:"compare", headers:["Роль","Главный вопрос","Главный артефакт"], rows:[
      ["Product Owner","Что делать сейчас, чтобы максимизировать ценность?","Приоритизированный бэклог"],
      ["Product Manager","Куда мы идём как продукт и почему?","Стратегия, vision, roadmap"],
      ["Project Manager","Как доставить план в срок?","План, риски, статус"]
    ]}
  ],
  K:"В большинстве B2B SaaS-компаний роли PO и PM комбинируются. Тебе придётся носить все 4 шляпы PO + значительную часть шляп PM.",
  T:"Возьми один реальный запрос недели. Запиши: через какую шляпу ты отреагировал и какая была бы правильной."
});

COURSE.push({
  d:2, w:1, t:"Product Vision & Strategy", e:"🧭", a:"Стратегия",
  s1:{sc:[
    "На квартальном review CEO презентует vision: «Стать #1 platform для DevOps engineers через AI-first подход». Что отличает работоспособный vision от слабого?",
    "Маркетинг прислал «новый vision» — баннер: «Empower teams. Innovate faster. Win together.». Что должно быть в правильном vision?",
    "Founder написал vision из 14 страниц с buzz-словами «AI-native», «hyper-scalable», «paradigm-shifting». Что должно быть в vision на самом деле?"

// === ENGINE ===
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function $(id){return document.getElementById(id);}
function loadProg(){try{return JSON.parse(localStorage.getItem('po_progress')||'{}');}catch(e){return {};}}
function saveProg(p){var j=JSON.stringify(p);try{localStorage.setItem('po_progress',j);}catch(e){}if(window.POCloud)POCloud.mirror('po_progress',j);}
function loadDiag(){try{return JSON.parse(localStorage.getItem('po_diagnostic_day0')||'null');}catch(e){return null;}}

const WEEKS = [
  {n:1, title:"Неделя 1", theme:"Фундамент роли и метрики", days:[1,2,3,4,5,6,7]},
  {n:2, title:"Неделя 2", theme:"Discovery и исследования", days:[8,9,10,11,12,13,14]},
  {n:3, title:"Неделя 3", theme:"Приоритизация и бэклог", days:[15,16,17,18,19,20,21]},
  {n:4, title:"Неделя 4", theme:"Стейкхолдеры, доставка, стратегия", days:[22,23,24,25,26,27,28]},
  {n:5, title:"Финал", theme:"Итоговый кейс и аттестация", days:[29,30]}
];

function getLesson(day){return COURSE.find(c=>c.d===day);}

function renderHome(){
  const prog = loadProg();
  const diag = loadDiag();
  const done = Object.keys(prog).filter(k=>k.startsWith('day')).map(k=>parseInt(k.slice(3)));
  const lastDay = Math.max(0,...done);
  const currentDay = lastDay + 1;
  const accScore = done.length > 0 ? Object.keys(prog).filter(k=>k.startsWith('day')).map(k=>prog[k].score||0).reduce((s,v)=>s+v,0)/done.length : 0;

  let html = `
    <div class="nav-bar">
      <h1>Evolution PO · карта курса</h1>
      <div style="display:flex;gap:8px">
        <a href="flashcards.html">🧠 Флэш-карты</a>
        <a href="achievements.html">🛡️ Гербы</a>
        <a href="metrics.html">📊 Метрики</a>
        <a href="index.html">🏠 Стартовая</a>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="v">${done.length}/30</div><div class="l">Пройдено</div></div>
      <div class="stat"><div class="v">${accScore>0?Math.round(accScore*100)+'%':'—'}</div><div class="l">Точность</div></div>
      <div class="stat"><div class="v">🔥${prog.streak||0}</div><div class="l">Страйк</div></div>
    </div>
  `;

  if (!diag) {
    html += `<div class="key-takeaway"><b>📍 Стартовая диагностика не пройдена.</b> Открой <a href="day-0-diagnostic.html">диагностику</a> — 10 минут, и ты увидишь свою точку отсчёта.</div>`;
  }

  for (const w of WEEKS) {
    html += `<div class="map-week"><div class="map-week-title">${w.title}</div><div class="map-week-theme">${w.theme}</div><div class="map-days">`;
    for (const dn of w.days) {
      const lesson = getLesson(dn);
      const isDone = done.includes(dn);
      const isCurrent = dn === currentDay;
      const isReview = lesson?.review;
      const cls = ['map-day'];
      if (isDone) cls.push('done');
      if (isCurrent) cls.push('current');
      if (isReview) cls.push('review');
      const topic = lesson ? lesson.t : '—';
      const dayProg = prog['day' + dn];
      const deepDone = dayProg && dayProg.deep && dayProg.deep.passedAt;
      html += `<a class="${cls.join(' ')}" href="#day-${dn}"><div class="badge"></div><div class="n">${dn}</div><div class="topic">${topic}</div>${deepDone ? '<div class="deep-mark">🎓</div>' : ''}</a>`;
    }
    html += `</div></div>`;
  }

  $('root').innerHTML = html;
}

function renderLesson(day){
  const lesson = getLesson(day);
  if (!lesson) {
    $('root').innerHTML = `<div class="card"><h2>День ${day} ещё не построен</h2><p>Этот урок в подготовке. <a href="#home">Вернуться к карте</a></p></div>`;
    return;
  }

  // pick scenarios, shuffle options
  const slots = {1:lesson.s1, 2:lesson.s2, 3:lesson.s3};
  const active = {1:null, 2:null, 3:null};
  for (const k of [1,2,3]) {
    const s = slots[k];
    if (!s) continue;
    active[k] = {
      scenario: pick(s.sc),
      options: shuffle(s.op.map(([t,ok,why])=>({t,ok,why})))
    };
  }

  // Learning content
  const learningHtml = (lesson.L||[]).map(b=>{
    if (b.type==='p') return `<p>${b.html}</p>`;
    if (b.type==='card') return `<div class="card">${b.html}</div>`;
    if (b.type==='cards') return `<div class="lcards">${b.items.map(it=>`<div class="lcard"><span class="emoji">${it.e||''}</span><div class="nm">${it.nm}</div><div class="ds">${it.ds}</div></div>`).join('')}</div>`;
    if (b.type==='compare') return `<table class="compare-table"><tr>${b.headers.map(h=>`<th>${h}</th>`).join('')}</tr>${b.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table>`;
    if (b.type==='formula') return `<div class="formula-box"><div class="lbl">${b.lbl||''}</div>${b.html}</div>`;
    if (b.type==='list') return `<ul style="padding-left:20px;font-size:14px">${b.items.map(i=>`<li style="margin-bottom:6px">${i}</li>`).join('')}</ul>`;
    if (b.type==='key') return `<div class="key-takeaway">${b.html}</div>`;
    return '';
  }).join('');

  const isReview = lesson.review;
  const phaseTab1 = isReview ? 'Кейс<br>10 мин' : 'Диагностика<br>3 мин';
  const phaseTab2 = isReview ? 'Разбор<br>—' : 'Обучение<br>5 мин';
  const phaseTab3 = isReview ? 'Решение<br>—' : 'Проверка<br>2 мин';

  $('root').innerHTML = `
    <div class="nav-bar">
      <a href="#home">← карта курса</a>
      <span class="day-chip">ДЕНЬ ${lesson.d} · НЕДЕЛЯ ${lesson.w}</span>
      <div class="timer" id="timer">⏱ 10:00</div>
    </div>
    <h1>${lesson.e||''} ${lesson.t}</h1>
    <div class="phase-tabs">
      <div class="phase-tab active" id="tab-1"><span class="num">1</span>${phaseTab1}</div>
      <div class="phase-tab" id="tab-2"><span class="num">2</span>${phaseTab2}</div>
      <div class="phase-tab" id="tab-3"><span class="num">3</span>${phaseTab3}</div>
    </div>

    <div class="phase active" id="phase-1">
      <h2>🔍 ${isReview?'Кейс — применяем неделю':'Диагностика — что ты знаешь?'}</h2>
      ${active[1] ? `<div class="card"><div class="scenario"><b>${isReview?'Кейс':'Сценарий 1'}:</b> ${active[1].scenario}</div><div class="options">${active[1].options.map((o,j)=>`<label><input type="radio" name="q1" onchange="answerSlot(1,${j})"><span>${o.t}</span></label>`).join('')}</div><div class="feedback" id="fb-1"></div></div>` : ''}
      ${active[2] ? `<div class="card"><div class="scenario"><b>${isReview?'Уточнение':'Сценарий 2'}:</b> ${active[2].scenario}</div><div class="options">${active[2].options.map((o,j)=>`<label><input type="radio" name="q2" onchange="answerSlot(2,${j})"><span>${o.t}</span></label>`).join('')}</div><div class="feedback" id="fb-2"></div></div>` : ''}
      <button id="to-phase-2" disabled onclick="goPhase(2)">Ответь на сценарий${active[2]?'ии':''}</button>
    </div>

    <div class="phase" id="phase-2">
      <h2>🧠 ${isReview?'Разбор и принципы':'Обучение — фреймворк'}</h2>
      ${learningHtml}
      ${lesson.K ? `<div class="key-takeaway"><b>⚡ Ключ:</b> ${lesson.K}</div>` : ''}
      <button onclick="goPhase(3)">Понятно → Проверка</button>
    </div>

    <div class="phase" id="phase-3">
      <h2>✅ ${isReview?'Финальное решение':'Проверка — кейс'}</h2>
      ${active[3] ? `<div class="card"><div class="scenario"><b>${isReview?'Решение':'Кейс'}:</b> ${active[3].scenario}</div><div class="options">${active[3].options.map((o,j)=>`<label><input type="radio" name="q3" onchange="answerSlot(3,${j})"><span>${o.t}</span></label>`).join('')}</div><div class="feedback" id="fb-3"></div></div>` : ''}
      ${lesson.T ? `<div class="micro-task" id="micro-task" style="display:none"><div class="label">МИКРО-ЗАДАНИЕ</div><div style="font-size:15px;line-height:1.5">${lesson.T}</div><textarea id="reflection" placeholder="Запиши ответ в одно предложение..."></textarea></div>` : ''}
      <div class="complete-banner" id="complete" style="display:none">
        <h3>🎯 День ${lesson.d} — пройден</h3>
        <p>Тема «${lesson.t}» закреплена.</p>
        <div class="stats">
          <div class="stat"><div class="v" id="stat-score">—</div><div class="l">Точность</div></div>
          <div class="stat"><div class="v">${lesson.d}/30</div><div class="l">Дней</div></div>
          <div class="stat"><div class="v">🔥<span id="stat-streak">—</span></div><div class="l">Страйк</div></div>
        </div>
        <div class="nav-buttons" style="flex-wrap:wrap">
          ${(window.COURSE_EXTRAS && window.COURSE_EXTRAS[lesson.d]) ? `<button class="deep-btn" onclick="openCourseLesson(${lesson.d})">🎓 Углублённый разбор</button>` : ''}
          <a href="#home" class="btn btn-secondary" style="color:#1a1a1a">← карта</a>
          ${lesson.d < 30 ? `<a href="#day-${lesson.d+1}" class="btn" style="background:white;color:#0f0f14">День ${lesson.d+1} →</a>` : ''}
        </div>
      </div>
      <button id="finish-btn" disabled onclick="finishLesson(${lesson.d})">Ответь на кейс</button>
    </div>
  `;

  window._activeSlots = active;
  window._answers = {};
  startTimer();
}

let _tickInterval = null;
function startTimer(){
  if (_tickInterval) clearInterval(_tickInterval);
  let secondsLeft = 600;
  const timerEl = $('timer');
  if (!timerEl) return;
  _tickInterval = setInterval(()=>{
    secondsLeft--;
    const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
    timerEl.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
    if (secondsLeft<=120) timerEl.classList.add('warning');
    if (secondsLeft<=0){clearInterval(_tickInterval); timerEl.textContent='⏱ время';}
  },1000);
}

function answerSlot(slot, optIdx){
  window._answers[slot] = optIdx;
  const opt = window._activeSlots[slot].options[optIdx];
  const fb = $(`fb-${slot}`);
  fb.className = 'feedback show ' + (opt.ok?'correct':'wrong');
  fb.innerHTML = (opt.ok?'✓ ':'✗ ') + opt.why;

  if (slot===1 || slot===2) {
    const need = window._activeSlots[2] ? 2 : 1;
    const filled = [1,2].filter(s=>window._answers[s]!==undefined).length;
    if (filled >= need) {
      const btn = $('to-phase-2');
      btn.disabled = false;
      btn.textContent = 'Понял → Обучение';
    }
  } else if (slot===3) {
    if ($('micro-task')) $('micro-task').style.display='block';
    const btn = $('finish-btn');
    btn.disabled = false;
    btn.textContent = '🏁 Завершить день';
  }
}

function goPhase(p){
  document.querySelectorAll('.phase').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.phase-tab').forEach((el,i)=>{
    el.classList.remove('active');
    if (i+1<p) el.classList.add('done');
    if (i+1===p) el.classList.add('active');
  });
  $(`phase-${p}`).classList.add('active');
  $(`tab-${p}`).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function finishLesson(day){
  const slots = Object.keys(window._activeSlots).filter(k=>window._activeSlots[k]);
  const total = slots.length;
  const correct = slots.filter(k=>{
    const ai = window._answers[k];
    return ai!==undefined && window._activeSlots[k].options[ai].ok;
  }).length;
  const score = total>0 ? correct/total : 0;
  $('stat-score').textContent = Math.round(score*100)+'%';

  const prog = loadProg();
  prog[`day${day}`] = {date:new Date().toISOString(), score, reflection: $('reflection')?.value || ''};
  prog.lastDay = Math.max(prog.lastDay||0, day);
  prog.streak = (prog.streak||0) + 1;
  saveProg(prog);

  $('stat-streak').textContent = prog.streak;
  $('complete').style.display = 'block';
  $('finish-btn').style.display = 'none';
  document.querySelectorAll('.phase-tab').forEach(el=>el.classList.add('done'));
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

// ===================================================================
// Углублённый разбор дня · единый плеер уроков (как в metrics.html)
// Шаги: intro / scenario / calc / diagnose / trap / recall / case
// На финише: po_progress[dayN].deep = {pct, passedAt} + рейтинг через
// существующий saveProg (mirror в облако автоматически).
// ===================================================================
let CLSN = null;

function _lEsc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function _normTxt(s){ return String(s||'').toLowerCase().replace(/[ё]/g,'е').replace(/[^a-zа-я0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function _checkRecall(input, accept, freeform){
  const u = _normTxt(input); if (!u) return false;
  if (freeform) return true; // принимаем любой непустой ответ
  return accept.some(a => {
    const n = _normTxt(a); if (!n) return false;
    if (u.indexOf(n) !== -1) return true;
    const toks = n.split(' ').filter(t => t.length > 2);
    if (!toks.length) return false;
    const hits = toks.filter(t => u.indexOf(t) !== -1).length;
    return hits / toks.length >= 0.65;
  });
}

function openCourseLesson(d){
  const steps = (window.COURSE_EXTRAS && window.COURSE_EXTRAS[d]) || [];
  if (!steps.length) return;
  CLSN = { d:d, steps:steps, i:0, results:[] };
  $('lsnModal').classList.remove('hidden');
  _renderCStep();
}
function _closeCLesson(){ $('lsnModal').classList.add('hidden'); CLSN = null; }
function _cBar(){
  return '<div class="lsn-bar">' + CLSN.steps.map((_,i)=>{
    let cls='seg'; if (i<CLSN.i) cls += (CLSN.results[i]===false?' wrong':' done'); else if (i===CLSN.i) cls+=' cur';
    return '<div class="'+cls+'"></div>';
  }).join('') + '</div>';
}

function _renderCStep(){
  const sheet = $('lsnSheet');
  const step = CLSN.steps[CLSN.i];
  const title=step[0], type=step[1], data=step[2];
  const dayLesson = COURSE.find(x => x.d === CLSN.d);
  const head =
    '<button class="lsn-close" onclick="_closeCLesson()">Закрыть</button>' +
    '<div class="lsn-step">Углублённый разбор · день ' + CLSN.d +
      (dayLesson ? ' · ' + _lEsc(dayLesson.t) : '') +
      ' · шаг ' + (CLSN.i+1) + ' / ' + CLSN.steps.length + '</div>' +
    '<div class="lsn-title">' + _lEsc(title) + '</div>' + _cBar();

  let body = '';
  if (type==='intro' || type==='case') {
    body = '<div class="lsn-body">' + _lEsc(data).replace(/\n/g,'<br>') + '</div>' +
      '<button class="lsn-next on" id="cNext">Дальше →</button>';
  } else if (type==='scenario') {
    body =
      '<div class="lsn-body">' + _lEsc(data.setup) + '</div>' +
      '<div class="lsn-row"><div class="lsn-lbl">Расчёт</div>' +
        '<div class="lsn-body code">' + _lEsc(data.formula) + ' = ' + _lEsc(String(data.answer)) + ' ' + _lEsc(data.unit||'') + '</div></div>' +
      '<div class="lsn-fb on info">💡 ' + _lEsc(data.insight) + '</div>' +
      '<button class="lsn-next on" id="cNext">Понял, дальше →</button>';
  } else if (type==='calc') {
    body =
      '<div class="lsn-body">' + _lEsc(data.prompt) + '</div>' +
      '<div class="lsn-row"><div class="lsn-lbl">Твой ответ' + (data.unit?' ('+_lEsc(data.unit)+')':'') + '</div>' +
        '<input class="lsn-num" id="cNum" type="text" inputmode="decimal" placeholder="число" /></div>' +
      '<button class="lsn-check" id="cCheck">Проверить</button>' +
      '<div class="lsn-fb" id="cFb"></div>' +
      '<button class="lsn-next" id="cNext">Дальше →</button>';
  } else if (type==='diagnose' || type==='trap') {
    body =
      '<div class="lsn-body">' + _lEsc(data.setup) + '</div>' +
      '<div class="lsn-row" id="cOpts">' +
        data.options.map((o,j)=>'<div class="lsn-opt" data-i="'+j+'">'+_lEsc(o.t)+'</div>').join('') +
      '</div><div class="lsn-fb" id="cFb"></div>' +
      '<button class="lsn-next" id="cNext">Дальше →</button>';
  } else if (type==='recall') {
    body =
      '<div class="lsn-body">' + _lEsc(data.prompt) + '</div>' +
      '<div class="lsn-row"><input class="lsn-text" id="cTxt" type="text" placeholder="ключевые слова" autocomplete="off" /></div>' +
      '<button class="lsn-check" id="cCheck">Проверить</button>' +
      '<div class="lsn-fb" id="cFb"></div>' +
      '<button class="lsn-next" id="cNext">Дальше →</button>';
  }

  sheet.innerHTML = head + body;
  _bindCStep(type, data);
}

function _bindCStep(type, data){
  const fb = $('cFb'), nxt = $('cNext');
  const go = (ok, msg) => {
    if (fb){ fb.className = 'lsn-fb on ' + (ok ? 'ok' : 'bad'); fb.innerHTML = msg; }
    if (nxt) nxt.classList.add('on');
    CLSN.results.push(!!ok);
  };
  if (type==='intro' || type==='case' || type==='scenario'){
    CLSN.results.push(null); // pass-through
    if (nxt) nxt.onclick = _advanceCLesson;
    return;
  }
  if (type==='calc'){
    $('cCheck').onclick = () => {
      const v = $('cNum').value;
      const n = parseFloat(String(v).replace(',','.'));
      const ok = !isNaN(n) && Math.abs(n - data.answer) <= (data.tol || 0);
      go(ok, (ok ? '✓ Верно. ' : '✗ Не совпало (ответ: ' + data.answer + (data.unit ? ' ' + data.unit : '') + '). ') + _lEsc(data.explain || ''));
    };
    if (nxt) nxt.onclick = _advanceCLesson;
    return;
  }
  if (type==='diagnose' || type==='trap'){
    const opts = document.querySelectorAll('#cOpts .lsn-opt');
    opts.forEach(el => {
      el.onclick = () => {
        if (el.dataset.locked) return;
        opts.forEach(o => {
          o.dataset.locked='1'; o.style.cursor='default';
          const idx = parseInt(o.dataset.i,10);
          if (data.options[idx].correct) o.classList.add('right');
        });
        const idx = parseInt(el.dataset.i,10);
        const picked = data.options[idx];
        el.classList.add(picked.correct ? 'correct' : 'wrong');
        go(picked.correct, (picked.correct ? '✓ ' : '✗ ') + _lEsc(picked.why || ''));
      };
    });
    if (nxt) nxt.onclick = _advanceCLesson;
    return;
  }
  if (type==='recall'){
    $('cCheck').onclick = () => {
      const v = $('cTxt').value;
      const ok = _checkRecall(v, data.accept || [], !!data.freeform);
      const canon = data.canonical || (data.accept && data.accept[0]) || '';
      go(ok, (ok ? '✓ Засчитано. ' : '✗ Не совпало. ') + (canon ? 'Эталон: <i>' + _lEsc(canon) + '</i>' : ''));
    };
    if (nxt) nxt.onclick = _advanceCLesson;
    return;
  }
}

function _advanceCLesson(){
  CLSN.i++;
  if (CLSN.i >= CLSN.steps.length) _finishCLesson();
  else _renderCStep();
}

function _finishCLesson(){
  const interactive = CLSN.results.filter(r => r !== null);
  const correct = interactive.filter(r => r === true).length;
  const total = interactive.length;
  const pct = total ? Math.round(correct / total * 100) : 100;
  const passed = pct >= 70;

  // Persist в po_progress[dayN].deep
  const prog = loadProg();
  const key = 'day' + CLSN.d;
  prog[key] = prog[key] || { date: new Date().toISOString() };
  prog[key].deep = { pct: pct, correct: correct, total: total,
    passedAt: passed ? Date.now() : (prog[key].deep && prog[key].deep.passedAt) || 0 };
  saveProg(prog);

  const cls = pct >= 80 ? 'ok' : pct >= 50 ? 'mid' : 'bad';
  $('lsnSheet').innerHTML =
    '<button class="lsn-close" onclick="_closeCLesson()">Закрыть</button>' +
    '<div class="lsn-step">Углублённый разбор завершён · день ' + CLSN.d + '</div>' +
    '<div class="lsn-title">' + (passed ? '🎉 Зачёт' : '🔁 Нужно повторить') + '</div>' +
    '<div class="lsn-end"><div class="pct ' + cls + '">' + pct + '%</div>' +
    '<div style="color:#9ca3af;font-size:13.5px">' + correct + ' / ' + total + ' интерактивных шагов верно. ' +
    (passed ? 'День отмечен как глубоко проработанный 🎓' : 'Открой разбор снова позже — интервалы скорректированы.') +
    '</div></div>' +
    '<div style="display:flex;gap:10px;margin-top:18px">' +
      '<button class="deep-btn" style="flex:1" onclick="openCourseLesson(' + CLSN.d + ')">🔁 Пройти ещё раз</button>' +
      '<button class="lsn-next on" style="flex:1" onclick="_closeCLesson(); if (window.location.hash) router(); else renderHome();">Готово</button>' +
    '</div>';
  CLSN = null;
}

function router(){
  const hash = window.location.hash.slice(1) || 'home';
  if (hash === 'home') renderHome();
  else if (hash.startsWith('day-')) {
    const day = parseInt(hash.slice(4));
    if (day>=1 && day<=30) renderLesson(day);
    else renderHome();
  } else renderHome();
}
window.addEventListener('hashchange', router);
router();
</script>
<script src="tma-init.js"></script>
</body>
